<style>
  :root{
    --l-red:#e2231a;
    --o-yellow:#f6d227;
    --g-green:#3ddc3d;
    --i-blue:#1226c7;
    --c-purple:#7a17b0;
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    font-family:'Noto Sans KR', sans-serif;
    background:#000;
    overflow:hidden;
  }

  .stage{
    position:relative;
    width:100vw;
    height:100vh;
    overflow:hidden;
    background-color:#3f8ee8;
  }

  /* ---------- BACKGROUND: 구름 (clouds/sky photo) ---------- */
  .cloud-bg{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center center;
  }

  /* ---------- 무지개 (rainbow, flipped horizontally) ---------- */
  .rainbow-img{
    position:absolute;
    top:-9%;
    left:-6%;
    width:62%;
    max-width:900px;
    pointer-events:none;
    filter:drop-shadow(0 4px 10px rgba(0,0,0,0.12));
  }

  /* ---------- 잔디 (grass, tiled across bottom) ---------- */

    position:absolute;
    left:0; right:0; bottom:0;
    width:100%;
    height:20%;
    overflow:hidden;
  }

    font-family:'Permanent Marker', cursive;
    font-size:clamp(48px, 9vw, 140px);
    line-height:1;
    -webkit-text-stroke:2px rgba(0,0,0,0.12);
    filter:drop-shadow(0 3px 3px rgba(0,0,0,0.25));
    user-select:none;
  }

  .letter-L{ color:var(--l-red);    top:52%; left:13%;  transform:rotate(-68deg) scale(1,1.05); }
  .letter-O{ color:var(--o-yellow); top:34%; left:18%;  transform:rotate(-42deg); }
  .letter-G{ color:var(--g-green);  top:19%; left:27%;  transform:rotate(-16deg); }
  .letter-I{ color:var(--i-blue);   top:10%; left:37.5%; transform:rotate(2deg) scaleY(1.15); }
  .letter-C{ color:var(--c-purple); top:12%; left:45.5%; transform:rotate(24deg); }

  /* ---------- LOGIN PANEL ---------- */
  .login-panel{
    position:absolute;
    top:50%;
    left:63%;
    transform:translate(-50%,-50%);
    width:min(38vw, 620px);
    display:flex;
    flex-direction:column;
    gap:18px;
  }

  .field{
    background:rgba(255,255,255,0.94);
    border:1.5px solid rgba(30,30,30,0.55);
    border-radius:2px;
    box-shadow:2px 3px 0 rgba(0,0,0,0.08);
    padding:16px 20px;
    font-size:20px;
    color:#3a3a3a;
    display:flex;
    align-items:center;
  }

  input.pw-input{
    border:none;
    outline:none;
    background:transparent;
    width:100%;
    font-family:'Noto Sans KR', sans-serif;
    font-size:20px;
    color:#3a3a3a;
  }
  input.pw-input::placeholder{
    color:#3a3a3a;
    opacity:1;
  }

  .btn{
    background:rgba(255,255,255,0.94);
    border:1.5px solid rgba(30,30,30,0.55);
    border-radius:2px;
    box-shadow:2px 3px 0 rgba(0,0,0,0.08);
    padding:14px 20px;
    font-size:19px;
    color:#3a3a3a;
    text-align:center;
    cursor:pointer;
    transition:background .15s ease, transform .05s ease;
    width:60%;
    align-self:center;
  }
  .btn:hover{ background:#f4f4f4; }
  .btn:active{ transform:translateY(1px); }

  .btn.secondary{
    width:100%;
    align-self:stretch;
    font-size:19px;
  }

  @media (max-width: 820px){
    .login-panel{
      left:50%;
      top:66%;
      width:82vw;
    }
    .logic-letter{ font-size:11vw; }
    .rainbow-img{ width:78%; top:-6%; left:-10%; }
    
  }
</style>
</head>

  <!-- 잔디 (화면 폭에 맞게 타일링) -->
  <div class="grass-layer">
    <div class="grass-tile"></div>
  </div>

  <!-- LOGIC LETTERS -->
  <div class="logic-wrap">
    <span class="logic-letter letter-L">L</span>
    <span class="logic-letter letter-O">O</span>
    <span class="logic-letter letter-G">G</span>
    <span class="logic-letter letter-I">I</span>
    <span class="logic-letter letter-C">C</span>
  </div>

  <!-- LOGIN PANEL -->
  <div class="login-panel">
    <div class="field">
      <input class="pw-input" type="password" placeholder="비밀번호 입력">
    </div>
    <div class="btn" id="confirmBtn">확인</div>
    <div class="btn secondary" id="findBtn">회원가입/비밀번호 찾기</div>
  </div>

</div>

<script>
  document.getElementById('confirmBtn').addEventListener('click', function(){
    const pw = document.querySelector('.pw-input').value;
    if(!pw){
      alert('비밀번호를 입력해주세요.');
    } else {
      alert('로그인 확인 버튼이 클릭되었습니다.');
    }
  });
  document.getElementById('findBtn').addEventListener('click', function(){
    alert('회원가입 / 비밀번호 찾기 페이지로 이동합니다.');
  });
</script>
